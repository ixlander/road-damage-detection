name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src apps api demo datasets
      - name: Tests
        run: pytest
      - name: Smoke inference
        run: python -m road_damage.modeling.predict --smoke
      - name: Smoke evaluation
        run: python -m road_damage.modeling.evaluate --smoke --config configs/eval/default.yaml --out outputs/ci_eval
